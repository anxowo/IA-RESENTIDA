<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>IA Local</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .bot {
      background: #1e293b;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Escribe algo..." />
  <button onclick="send()">Enviar</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  // mensaje temporal
  const loading = addMessage("...", "bot");

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    loading.remove();
    addMessage(data.content || "Sin respuesta", "bot");

  } catch (err) {
    console.error(err);
    loading.remove();
    addMessage("Error conectando con el servidor", "bot");
  }
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);

  // autoscroll
  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;

  return div;
}

 // He añadido esta parte para que no haya que pulsar el botón que es un coñazo ~ Pablo
  const input = document.getElementById("input");

input.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    send();
  }
});
</script>

</body>
</html>
